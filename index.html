<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PLU Editor</title>
  <link rel="icon" type="image/png" sizes="48x48" href="./img/PLU2.png">
  <!-- FullCalendar (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/interaction.global.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="calendar"></div>
  <div id="loadError" class="load-error" style="display:none;"></div>

  <!-- ✅ 1) Spinner: загрузка задач (НЕ модальный, без рамочки) -->
  <div id="loadSpinner" class="load-spinner is-on" aria-hidden="false">
    <div class="ring" aria-label="Завантаження"></div>
    <div class="label">Завантаження…</div>
  </div>

  <!-- ✅ 2) Spinner: авторизация (МОДАЛЬНЫЙ) -->
  <div id="authSpinner" class="auth-spinner" aria-hidden="true">
    <div class="box">
      <div class="ring"></div>
      <div class="label">Авторизація…</div>
    </div>
  </div>

  <div id="ctx" class="ctx">
    <div id="ctxHint" class="hint">Виберіть інтервал</div>
    <button id="ctxCreate">➕ Додати запис</button>
    <button id="ctxDelete" style="display:none;">🗑️ Видалити запис</button>
    <button id="ctxClear">🧹 Очистити виділення</button>
  </div>

  <div id="backdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Деталі запису">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">Деталі</div>

        <div class="modal-tools">
          <!-- 🕘 Підставити останній запис (localStorage) -->
          <button id="mPasteLast" class="icon-btn" type="button" title="Підставити останній запис">🕘</button>

          <!-- 📧 Вставити з Outlook -->
          <button id="mPasteMail" class="icon-btn" type="button" title="Вставити з Outlook (буфер)">📧</button>
        </div>
      </div>

      <div id="mWhen" class="small"></div>

      <div class="row row-when">
        <label>Коли</label>
        <div class="when-grid">
          <div class="mini">
            <span>Дата</span>
            <input id="mDate" type="date" />
          </div>

          <div class="mini">
            <span>Час з</span>
            <input id="mFrom" type="time" step="60" />
          </div>

          <div class="mini">
            <span>Час по</span>
            <input id="mTo" type="time" step="60" />
          </div>
        </div>
      </div>

      <div class="row">
        <label>Для журналу</label>
        <textarea id="mDescription" rows="4"></textarea>
      </div>

      <div class="row">
        <label>Завдання</label>
        <div class="ac ac-clearable">
          <input
            id="mKpldText"
            type="text"
            autocomplete="off"
            __placeholder="Оберіть (список зʼявиться при фокусі) або введіть для пошуку…"
          />
          <input id="mKpld" type="hidden" value="" />
          <button type="button" id="mKpldClear" class="ac-clear-btn" title="Очистити">✖</button>
          <div id="mKpldList" class="ac-list" style="display:none;"></div>
        </div>
      </div>

      <div class="row">
        <label>Місце роботи</label>
        <select id="mPlaceWork">
          <option value="">Основний офіс</option>
          <option value="Б">Б — Хвороба</option>
          <option value="Г">Г — Готель</option>
          <option value="Д">Д — Робота вдома</option>
          <option value="К">К — Виїзд на об'єкт замовника</option>
          <option value="О">О — Відпочинок</option>
          <option value="П">П — Офіс в КПІ</option>
          <option value="С">С — Узгоджене відхилення від СКД</option>
          <option value="Я">Я — Інше</option>
        </select>
      </div>

      <div id="mError" class="modal-error" style="display:none;"></div>

      <div class="actions">
        <button id="mCancel">Скасувати</button>
        <button id="mSave" class="primary">Зберегти</button>
      </div>
    </div>
  </div>



  <div id="uiConfirmBackdrop" class="modal-backdrop" style="display:none;">
    <div class="modal" style="max-width:420px;">
      <div class="modal-title" id="uiConfirmTitle">Підтвердження</div>
      <div id="uiConfirmText" class="small" style="margin-top:8px; white-space:pre-wrap;"></div>
      <div class="actions" style="margin-top:16px;">
        <button id="uiConfirmCancel">Скасувати</button>
        <button id="uiConfirmOk" class="primary">OK</button>
      </div>
    </div>
  </div>

  <div id="infoBackdrop" class="modal-backdrop" style="display:none;">
    <div class="modal" style="max-width:520px;">
      <div class="modal-title" id="infoTitle">Повідомлення</div>
      <div id="infoText" class="small" style="margin-top:10px; white-space:pre-wrap;"></div>
      <div class="actions" style="margin-top:16px;">
        <button id="infoOk" class="primary">OK</button>
      </div>
    </div>
  </div>

  <div id="loginBackdrop" class="modal-backdrop" style="display:none;">
    <div class="modal" style="max-width:520px;">
      <div class="modal-title">🔐 Вхід</div>

      <div class="row">
        <label>Логін</label>
        <input id="lUser" type="text" autocomplete="username" placeholder="введіть логін" />
      </div>

      <div class="row">
        <label>Пароль</label>
        <input id="lPass" type="password" autocomplete="current-password" placeholder="введіть пароль" />
      </div>

      <div id="lError" class="modal-error" style="display:none;"></div>

      <div class="actions">
        <button id="lCancel">Скасувати</button>
        <button id="lOk" class="primary">Увійти</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
